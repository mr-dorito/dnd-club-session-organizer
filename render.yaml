services:
  - type: web
    name: dnd-club-ai-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe
      - key: SPEAKER_TIMING_MODEL
        value: gpt-4o-transcribe-diarize
      - key: ALLOWED_ORIGIN
        value: "*"
